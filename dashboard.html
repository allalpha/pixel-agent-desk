<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Agent Desk Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font: 'JetBrains Mono', 'Consolas', monospace;
      --color-bg: #0d1117;
      --color-card: #161b22;
      --color-border: #30363d;
      --color-text: #e6edf3;
      --color-text-muted: #7d8590;
      --color-primary: #58a6ff;
      --color-success: #3fb950;
      --color-warning: #d29922;
      --color-error: #f85149;
      --color-info: #a371f7;
      --color-state-working: #f97316;
      --color-state-thinking: #8b5cf6;
      --color-state-waiting: #7d8590;
      --color-state-done: #3fb950;
      --color-state-help: #f85149;
      --color-state-error: #f85149;
      --color-state-offline: #30363d;
      --radius: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.5;
      min-height: 100vh;
    }

    .dashboard {
      display: grid;
      grid-template-columns: 140px 1fr;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      background: var(--color-card);
      border-right: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      padding: 12px 0;
      z-index: 10;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 0 8px;
    }

    .sidebar-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 8px 10px;
      background: transparent;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      color: var(--color-text-muted);
      text-align: left;
    }

    .sidebar-btn:hover { background: rgba(255,255,255,0.06); color: var(--color-text); }
    .sidebar-btn.active { background: rgba(88,166,255,0.12); color: var(--color-primary); font-weight: 600; }

    .sidebar-divider {
      height: 1px;
      background: var(--color-border);
      margin: 10px 12px;
    }

    .sidebar-section {
      padding: 0 12px;
      margin-bottom: 12px;
    }

    .sidebar-section-label {
      font-size: 0.6rem;
      font-weight: 600;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .sidebar-stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 0.7rem;
    }

    .sidebar-stat-label { color: var(--color-text-muted); }
    .sidebar-stat-value { color: var(--color-text); font-weight: 600; }
    .sidebar-stat-value.cost { color: var(--color-warning); }

    .sidebar-spacer { flex: 1; }

    .sidebar-bottom {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
    }

    .status-indicator {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--color-text-muted);
      flex-shrink: 0;
    }

    .status-indicator.connected { background: var(--color-success); }
    .status-indicator.disconnected { background: var(--color-error); }

    .sidebar-status-text {
      font-size: 0.65rem;
      color: var(--color-text-muted);
    }

    /* Content Area */
    .content-area {
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Disconnect Banner */
    .disconnect-banner {
      background: var(--color-error);
      color: #fff;
      text-align: center;
      padding: 5px 16px;
      font-size: 0.75rem;
      font-weight: 600;
      z-index: 100;
    }

    /* Office Split View */
    .office-split {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .office-panel-left {
      flex: 1;
      position: relative;
      background: #080c16;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
    }

    .office-panel-right {
      width: 320px;
      min-width: 320px;
      background: var(--color-bg);
      border-left: 1px solid var(--color-border);
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #office-canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
      max-width: 100%;
      max-height: 100%;
    }

    /* Standby Message */
    .standby-message {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      color: var(--color-text-muted);
      font-size: 0.8rem;
      text-align: center;
      flex: 1;
    }

    .standby-message-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 6px;
    }

    /* Agent Card (compact) */
    .agent-card {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-left: 3px solid var(--color-state-waiting);
      border-radius: var(--radius);
      padding: 10px 12px;
    }

    .agent-card.state-working { border-left-color: var(--color-state-working); }
    .agent-card.state-thinking { border-left-color: var(--color-state-thinking); }
    .agent-card.state-waiting { border-left-color: var(--color-state-waiting); }
    .agent-card.state-done { border-left-color: var(--color-state-done); }
    .agent-card.state-help { border-left-color: var(--color-state-help); }
    .agent-card.state-error { border-left-color: var(--color-state-error); }

    .agent-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .agent-name {
      font-size: 0.8rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .agent-name > span:first-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .agent-status {
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.55rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    .agent-status.working { background: rgba(249,115,22,0.15); color: var(--color-state-working); }
    .agent-status.thinking { background: rgba(139,92,246,0.15); color: var(--color-state-thinking); }
    .agent-status.waiting { background: rgba(148,163,184,0.15); color: var(--color-state-waiting); }
    .agent-status.done, .agent-status.completed { background: rgba(34,197,94,0.15); color: var(--color-state-done); }
    .agent-status.help { background: rgba(239,68,68,0.15); color: var(--color-state-help); }
    .agent-status.error { background: rgba(239,68,68,0.15); color: var(--color-state-error); }

    .agent-body {
      font-size: 0.7rem;
      color: var(--color-text-muted);
      margin-bottom: 6px;
      line-height: 1.6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .agent-body .lbl { color: var(--color-text-muted); }
    .agent-body .val { color: var(--color-text); }
    .agent-body .activity-active { color: var(--color-state-working); font-weight: 600; }

    .agent-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 6px;
      border-top: 1px solid var(--color-border);
      font-size: 0.65rem;
      color: var(--color-text-muted);
    }

    .agent-footer .val { color: var(--color-text); font-weight: 600; }

    .type-badge {
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 0.55rem;
      font-weight: 600;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .type-badge.main { background: rgba(59,130,246,0.15); color: var(--color-primary); }
    .type-badge.subagent { background: rgba(236,72,153,0.15); color: #ec4899; }
    .type-badge.teammate { background: rgba(34,211,238,0.15); color: #22d3ee; }

    /* Main Content (History) */
    .main-content {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }

    /* Heatmap */
    .heatmap-summary {
      font-size: 0.8rem;
      color: var(--color-text-muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .heatmap-summary strong {
      color: var(--color-text);
      font-weight: 600;
    }

    .heatmap-summary-sep {
      color: var(--color-border);
    }

    .heatmap-card {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .heatmap-scroll {
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .heatmap-grid {
      display: grid;
      grid-template-rows: auto repeat(7, 14px);
      grid-auto-columns: 14px;
      grid-auto-flow: column;
      gap: 3px;
      width: max-content;
    }

    .heatmap-month-label {
      font-size: 0.65rem;
      color: var(--color-text-muted);
      grid-row: 1;
      line-height: 14px;
      white-space: nowrap;
    }

    .heatmap-day-label {
      font-size: 0.6rem;
      color: var(--color-text-muted);
      text-align: right;
      padding-right: 4px;
      line-height: 14px;
      width: 28px;
    }

    .heatmap-cell {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      cursor: pointer;
    }

    .heatmap-cell:hover { outline: 2px solid var(--color-text-muted); outline-offset: -1px; }

    .heatmap-cell.level-0 { background: #1e293b; }
    .heatmap-cell.level-1 { background: #1e3a5f; }
    .heatmap-cell.level-2 { background: #1d4ed8; }
    .heatmap-cell.level-3 { background: #3b82f6; }
    .heatmap-cell.level-4 { background: #60a5fa; }

    .heatmap-legend {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 12px;
      justify-content: flex-end;
      font-size: 0.7rem;
      color: var(--color-text-muted);
    }

    .heatmap-legend-cell {
      width: 14px;
      height: 14px;
      border-radius: 3px;
    }

    /* Usage View */
    .usage-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .usage-title {
      font-size: 0.85rem;
      font-weight: 600;
    }

    .usage-toggle {
      display: flex;
      gap: 2px;
    }

    .usage-toggle-btn {
      padding: 4px 12px;
      border: 1px solid var(--color-border);
      border-radius: 14px;
      background: transparent;
      color: var(--color-text-muted);
      font-family: var(--font);
      font-size: 0.65rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .usage-toggle-btn:hover { border-color: var(--color-primary); color: var(--color-text); }
    .usage-toggle-btn.active { background: var(--color-primary); border-color: var(--color-primary); color: #fff; }

    .usage-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .usage-stat {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .usage-stat-value {
      font-size: 1.3rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .usage-stat-value.tokens { color: var(--color-primary); }
    .usage-stat-value.cost { color: var(--color-warning); }

    .usage-stat-label {
      font-size: 0.7rem;
      color: var(--color-text-muted);
      margin-top: 4px;
    }

    .usage-chart-card {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }

    .usage-chart-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--color-text-muted);
      margin-bottom: 12px;
    }

    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 140px;
    }

    .bar-chart-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      justify-content: flex-end;
    }

    .bar-chart-bar {
      width: 100%;
      max-width: 36px;
      border-radius: 3px 3px 0 0;
      min-height: 0;
      transition: height 0.3s ease;
    }

    .bar-chart-bar:hover { filter: brightness(1.3); }
    .bar-chart-bar.tokens { background: var(--color-primary); }
    .bar-chart-bar.cost { background: var(--color-warning); }

    .bar-chart-value {
      font-size: 0.5rem;
      color: var(--color-text-muted);
      margin-bottom: 3px;
      text-align: center;
      white-space: nowrap;
    }

    .bar-chart-label {
      font-size: 0.5rem;
      color: var(--color-text-muted);
      margin-top: 5px;
      text-align: center;
    }

    .heatmap-tooltip {
      position: fixed;
      background: #1e293b;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 0.75rem;
      color: var(--color-text);
      pointer-events: none;
      z-index: 1000;
      display: none;
      max-width: 260px;
    }

    .heatmap-tooltip .tt-date {
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--color-primary);
    }

    .heatmap-tooltip .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 2px;
    }

    .heatmap-tooltip .tt-label { color: var(--color-text-muted); }
    .heatmap-tooltip .tt-value { font-weight: 600; }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: var(--color-text-muted);
    }

    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--color-border);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-muted);
      font-size: 0.85rem;
    }

    .empty-state-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 8px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .office-split {
        flex-direction: column;
      }

      .office-panel-left {
        min-height: 300px;
      }

      .office-panel-right {
        width: 100%;
        min-width: unset;
        max-height: 40vh;
        border-left: none;
        border-top: 1px solid var(--color-border);
      }
    }
  </style>
</head>

<body>
  <div class="dashboard">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-nav">
        <button class="sidebar-btn active" data-view="office">Office</button>
        <button class="sidebar-btn" data-view="heatmap">History</button>
        <button class="sidebar-btn" data-view="usage">Usage</button>
      </div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">Session</div>
        <div class="sidebar-stat">
          <span class="sidebar-stat-label">Tokens</span>
          <span class="sidebar-stat-value" id="sidebarTokens">0</span>
        </div>
        <div class="sidebar-stat">
          <span class="sidebar-stat-label">Cost</span>
          <span class="sidebar-stat-value cost" id="headerCost">$0.00</span>
        </div>
        <div class="sidebar-stat">
          <span class="sidebar-stat-label">Agents</span>
          <span class="sidebar-stat-value" id="sidebarAgentCount">0</span>
        </div>
      </div>
      <div class="sidebar-spacer"></div>
      <div class="sidebar-bottom">
        <span class="status-indicator" id="statusIndicator" aria-hidden="true"></span>
        <span class="sidebar-status-text" id="connectionStatus">Connecting...</span>
      </div>
    </nav>

    <!-- Content Area -->
    <div class="content-area">
      <!-- Disconnection Banner -->
      <div id="disconnectBanner" class="disconnect-banner" style="display:none;">
        Disconnected — Attempting to reconnect...
      </div>

      <!-- Office View (Canvas + Agent Panel) -->
      <div id="officeView" class="office-split">
        <div class="office-panel-left">
          <canvas id="office-canvas"></canvas>
        </div>
        <div class="office-panel-right" id="agentPanel">
          <div id="standbyMessage" class="standby-message">
            <div class="standby-message-title">Standby</div>
            <p>Agents will appear here when active.</p>
          </div>
        </div>
      </div>

      <!-- Main Content (History) -->
      <main class="main-content" id="mainContent" style="display:none">
        <div class="loading">
          <div class="loading-spinner"></div>
          <span>Loading...</span>
        </div>
      </main>
    </div>
  </div>

  <!-- Heatmap Tooltip (global, position: fixed) -->
  <div class="heatmap-tooltip" id="heatmapTooltip"></div>

  <!-- Office modules (v2: avatar sync) -->
  <script src="/src/office/office-config.js?v=2"></script>
  <script src="/src/office/office-layers.js?v=2"></script>
  <script src="/src/office/office-coords.js?v=2"></script>
  <script src="/src/office/office-pathfinder.js?v=2"></script>
  <script src="/src/office/office-sprite.js?v=2"></script>
  <script src="/src/office/office-character.js?v=2"></script>
  <script src="/src/office/office-renderer.js?v=2"></script>
  <script src="/src/office/office-ui.js?v=2"></script>
  <script src="/src/office/office-init.js?v=2"></script>

  <script>
    /**
     * Pixel Agent Desk Dashboard — SSE-based real-time updates
     */

    const state = {
      agents: new Map(),
      stats: { total: 0, active: 0, completed: 0, totalTokens: 0, totalCost: 0 },
      connected: false,
      currentView: localStorage.getItem('dashboard-tab') || 'office'
    };

    // Migrate legacy view values
    if (state.currentView === 'agents') {
      state.currentView = 'office';
      localStorage.setItem('dashboard-tab', 'office');
    }

    const elements = {
      mainContent: document.getElementById('mainContent'),
      statusIndicator: document.getElementById('statusIndicator'),
      connectionStatus: document.getElementById('connectionStatus'),
      agentPanel: document.getElementById('agentPanel'),
      standbyMessage: document.getElementById('standbyMessage')
    };

    // ─── SSE ───

    let _sseReconnectDelay = 1000;
    let _sseEventSource = null;

    function connectSSE() {
      if (_sseEventSource) { _sseEventSource.close(); _sseEventSource = null; }

      const eventSource = new EventSource('/api/events');
      _sseEventSource = eventSource;

      eventSource.onopen = () => {
        _sseReconnectDelay = 1000;
        state.connected = true;
        updateConnectionStatus(true);
      };

      eventSource.onerror = () => {
        state.connected = false;
        updateConnectionStatus(false);
        eventSource.close();
        _sseEventSource = null;
        const delay = _sseReconnectDelay;
        _sseReconnectDelay = Math.min(_sseReconnectDelay * 2, 30000);
        setTimeout(connectSSE, delay);
      };

      eventSource.addEventListener('connected', () => fetchInitialData());

      eventSource.addEventListener('agent.created', (event) => {
        const data = JSON.parse(event.data).data;
        updateAgent(data);
        officeOnAgentCreated(data);
      });

      eventSource.addEventListener('agent.updated', (event) => {
        const data = JSON.parse(event.data).data;
        updateAgent(data);
        officeOnAgentUpdated(data);
      });

      eventSource.addEventListener('agent.removed', (event) => {
        const data = JSON.parse(event.data).data;
        removeAgent(data.id);
        officeOnAgentRemoved(data);
      });
    }

    // ─── Data ───

    async function fetchInitialData() {
      try {
        const response = await fetch('/api/agents');
        const agents = await response.json();
        for (const agent of agents) state.agents.set(agent.id, agent);
        updateStats();
        render();
      } catch (error) {
        console.error('[Dashboard] Failed to load initial data:', error);
        elements.mainContent.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-title">Connection Failed</div>
            <p>Unable to load agent data. Will retry automatically.</p>
          </div>`;
      }
    }

    function updateAgent(agent) {
      state.agents.set(agent.id, agent);
      updateStats();

      if (state.currentView === 'office') {
        const existingCard = elements.agentPanel.querySelector(`[data-card-id="${agent.id}"]`);
        if (existingCard) {
          const temp = document.createElement('div');
          temp.innerHTML = renderAgentCardCompact(agent);
          existingCard.replaceWith(temp.firstElementChild);
        } else {
          renderAgentPanel();
        }
      }
    }

    function removeAgent(sessionId) {
      state.agents.delete(sessionId);
      updateStats();

      const existingCard = elements.agentPanel.querySelector(`[data-card-id="${sessionId}"]`);
      if (existingCard) existingCard.remove();

      if (state.agents.size === 0) showStandbyMessage();
    }

    function updateStats() {
      const agents = Array.from(state.agents.values());
      state.stats.total = agents.length;
      state.stats.active = agents.filter(a => a.status === 'working' || a.status === 'thinking').length;
      state.stats.completed = agents.filter(a => a.status === 'done' || a.status === 'completed').length;
      state.stats.totalTokens = agents.reduce((s, a) => s + (a.tokenUsage?.inputTokens || 0) + (a.tokenUsage?.outputTokens || 0), 0);
      state.stats.totalCost = agents.reduce((s, a) => s + (a.tokenUsage?.estimatedCost || 0), 0);
      updateHeaderCost();
    }

    // ─── UI Updates ───

    function updateConnectionStatus(connected) {
      const banner = document.getElementById('disconnectBanner');
      if (connected) {
        elements.statusIndicator.classList.add('connected');
        elements.statusIndicator.classList.remove('disconnected');
        elements.connectionStatus.textContent = 'Connected';
        if (banner) banner.style.display = 'none';
      } else {
        elements.statusIndicator.classList.remove('connected');
        elements.statusIndicator.classList.add('disconnected');
        elements.connectionStatus.textContent = 'Disconnected';
        if (banner) banner.style.display = '';
      }
    }

    function updateHeaderCost() {
      const el = document.getElementById('headerCost');
      if (el) el.textContent = `$${state.stats.totalCost.toFixed(2)}`;
      const tokEl = document.getElementById('sidebarTokens');
      if (tokEl) tokEl.textContent = formatNumber(state.stats.totalTokens);
      const cntEl = document.getElementById('sidebarAgentCount');
      if (cntEl) cntEl.textContent = state.stats.total;
    }

    // ─── Agent Panel ───

    function renderAgentPanel() {
      const agents = Array.from(state.agents.values());
      if (agents.length === 0) { showStandbyMessage(); return; }

      elements.standbyMessage.style.display = 'none';

      // Remove cards that no longer exist
      const currentCards = elements.agentPanel.querySelectorAll('[data-card-id]');
      const agentIds = new Set(agents.map(a => a.id));
      currentCards.forEach(card => {
        if (!agentIds.has(card.dataset.cardId)) card.remove();
      });

      // Add/update cards
      for (const agent of agents) {
        const existingCard = elements.agentPanel.querySelector(`[data-card-id="${agent.id}"]`);
        if (existingCard) {
          const temp = document.createElement('div');
          temp.innerHTML = renderAgentCardCompact(agent);
          existingCard.replaceWith(temp.firstElementChild);
        } else {
          const temp = document.createElement('div');
          temp.innerHTML = renderAgentCardCompact(agent);
          elements.agentPanel.appendChild(temp.firstElementChild);
        }
      }
    }

    function showStandbyMessage() {
      // Remove all agent cards
      const cards = elements.agentPanel.querySelectorAll('[data-card-id]');
      cards.forEach(card => card.remove());
      elements.standbyMessage.style.display = '';
    }

    function renderAgentCardCompact(agent) {
      const statusClass = getStatusClass(agent.status);
      const statusText = getStatusText(agent.status);
      const typeBadge = getTypeBadge(agent);
      const elapsed = formatTime(agent.timing?.elapsed || 0);
      const tokens = (agent.tokenUsage?.inputTokens || 0) + (agent.tokenUsage?.outputTokens || 0);
      const cost = agent.tokenUsage?.estimatedCost || 0;
      const model = agent.model || 'Unknown';
      const isActive = agent.status === 'working' || agent.status === 'thinking';
      const activity = agent.currentTool || (isActive ? statusText : '-');

      return `
        <div class="agent-card state-${statusClass}" data-card-id="${agent.id}">
          <div class="agent-header">
            <div class="agent-name">
              <span>${agent.name || 'Agent'}</span>
              ${typeBadge}
            </div>
            <div class="agent-status ${statusClass}" role="status">${statusText}</div>
          </div>
          <div class="agent-body">
            <span class="lbl">Model:</span> <span class="val">${model}</span> &middot;
            <span class="lbl">Activity:</span> <span class="${isActive ? 'activity-active' : 'val'}">${activity}</span>
          </div>
          <div class="agent-footer">
            <span>Tokens: <span class="val">${formatNumber(tokens)}</span> &middot; $<span class="val">${cost.toFixed(2)}</span></span>
            <span>${elapsed}</span>
          </div>
        </div>`;
    }

    // ─── Render ───

    function render() {
      const officeView = document.getElementById('officeView');
      const mainContent = elements.mainContent;

      if (state.currentView === 'office') {
        officeView.style.display = 'flex';
        mainContent.style.display = 'none';
        renderAgentPanel();
        return;
      }

      officeView.style.display = 'none';
      mainContent.style.display = 'block';

      if (state.currentView === 'heatmap') renderHeatmap();
      else if (state.currentView === 'usage') renderUsage();
    }

    // ─── Helpers ───

    function getStatusClass(status) {
      return { working:'working', thinking:'thinking', waiting:'waiting', done:'done', completed:'done', help:'help', error:'error' }[status] || 'waiting';
    }

    function getStatusText(status) {
      return { working:'Working', thinking:'Thinking', waiting:'Waiting', done:'Done', completed:'Done', help:'Needs Help', error:'Error' }[status] || status;
    }

    function getTypeBadge(agent) {
      if (agent.metadata?.isSubagent) return '<span class="type-badge subagent">Sub</span>';
      if (agent.metadata?.isTeammate) return '<span class="type-badge teammate">Team</span>';
      return '<span class="type-badge main">Main</span>';
    }

    function formatTime(ms) {
      const s = Math.floor(ms / 1000), h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
      if (h > 0) return `${h}h ${m}m`;
      if (m > 0) return `${m}m ${sec}s`;
      return `${sec}s`;
    }

    function formatNumber(num) {
      if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
      if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
      return num.toString();
    }

    // ─── Heatmap ───

    const heatmapState = { data: null, loading: false };

    async function fetchHeatmapData() {
      heatmapState.loading = true;
      try {
        const res = await fetch('/api/heatmap?days=365');
        heatmapState.data = await res.json();
      } catch (e) {
        console.error('[Heatmap] fetch failed:', e);
        heatmapState.data = { days: {}, lastScan: 0 };
      }
      heatmapState.loading = false;
    }

    async function ensureHeatmapData() {
      if (!heatmapState.data) {
        elements.mainContent.innerHTML = `<div class="loading"><div class="loading-spinner"></div><span>Loading...</span></div>`;
        await fetchHeatmapData();
      }
    }

    async function renderHeatmap() {
      await ensureHeatmapData();

      const days = heatmapState.data.days || {};
      const summary = calculateHeatmapSummary(days);

      elements.mainContent.innerHTML = `
        <div class="heatmap-container">
          <div class="heatmap-summary">
            <span><strong>${summary.totalSessions}</strong> sessions</span>
            <span class="heatmap-summary-sep">&middot;</span>
            <span><strong>${summary.activeDays}</strong> days active</span>
            <span class="heatmap-summary-sep">&middot;</span>
            <span>streak <strong>${summary.currentStreak}</strong> (best ${summary.longestStreak})</span>
          </div>
          <div class="heatmap-card">
            <div class="heatmap-scroll">
              <div class="heatmap-grid" id="heatmapGrid"></div>
            </div>
            <div class="heatmap-legend">
              <span>Less</span>
              <div class="heatmap-legend-cell" style="background:#1e293b"></div>
              <div class="heatmap-legend-cell" style="background:#1e3a5f"></div>
              <div class="heatmap-legend-cell" style="background:#1d4ed8"></div>
              <div class="heatmap-legend-cell" style="background:#3b82f6"></div>
              <div class="heatmap-legend-cell" style="background:#60a5fa"></div>
              <span>More</span>
            </div>
          </div>
        </div>`;

      buildHeatmapGrid(days, 'sessions');
      attachHeatmapTooltips(days);
    }

    // ─── Usage View ───

    const usageState = { chartMode: 'weeks' };

    async function renderUsage() {
      await ensureHeatmapData();

      const days = heatmapState.data.days || {};
      const mode = usageState.chartMode;

      // Aggregate totals
      let totalTokens = 0, totalCost = 0, totalSessions = 0, totalToolUses = 0;
      for (const d of Object.values(days)) {
        totalTokens += (d.inputTokens || 0) + (d.outputTokens || 0);
        totalCost += d.estimatedCost || 0;
        totalSessions += d.sessions || 0;
        totalToolUses += d.toolUses || 0;
      }

      const tokenChartData = aggregateChartData(days, 'tokens', mode);
      const costChartData = aggregateChartData(days, 'cost', mode);

      elements.mainContent.innerHTML = `
        <div class="usage-header">
          <span class="usage-title">Token & Cost Usage</span>
          <div class="usage-toggle">
            <button class="usage-toggle-btn ${mode === 'weeks' ? 'active' : ''}" data-usage-mode="weeks">12 Weeks</button>
            <button class="usage-toggle-btn ${mode === 'months' ? 'active' : ''}" data-usage-mode="months">12 Months</button>
          </div>
        </div>
        <div class="usage-stats">
          <div class="usage-stat">
            <div class="usage-stat-value tokens">${formatNumber(totalTokens)}</div>
            <div class="usage-stat-label">Total Tokens</div>
          </div>
          <div class="usage-stat">
            <div class="usage-stat-value cost">$${totalCost.toFixed(2)}</div>
            <div class="usage-stat-label">Total Cost</div>
          </div>
          <div class="usage-stat">
            <div class="usage-stat-value tokens">${totalSessions}</div>
            <div class="usage-stat-label">Sessions</div>
          </div>
          <div class="usage-stat">
            <div class="usage-stat-value tokens">${formatNumber(totalToolUses)}</div>
            <div class="usage-stat-label">Tool Uses</div>
          </div>
        </div>
        <div class="usage-chart-card">
          <div class="usage-chart-title">Tokens</div>
          ${renderBarChart(tokenChartData, 'tokens')}
        </div>
        <div class="usage-chart-card">
          <div class="usage-chart-title">Cost ($)</div>
          ${renderBarChart(costChartData, 'cost')}
        </div>`;

      elements.mainContent.querySelector('.usage-toggle').addEventListener('click', (e) => {
        const btn = e.target.closest('[data-usage-mode]');
        if (!btn) return;
        usageState.chartMode = btn.dataset.usageMode;
        renderUsage();
      });
    }

    function aggregateChartData(days, metric, mode) {
      const getValue = (d) => {
        if (!d) return 0;
        switch (metric) {
          case 'tokens': return (d.inputTokens || 0) + (d.outputTokens || 0);
          case 'cost': return d.estimatedCost || 0;
          default: return 0;
        }
      };

      const result = [];
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      if (mode === 'weeks') {
        for (let w = 11; w >= 0; w--) {
          let sum = 0;
          const weekEnd = new Date(today);
          weekEnd.setDate(today.getDate() - w * 7);
          const weekStart = new Date(weekEnd);
          weekStart.setDate(weekEnd.getDate() - 6);
          const d = new Date(weekStart);
          while (d <= weekEnd) {
            sum += getValue(days[d.toISOString().slice(0, 10)]);
            d.setDate(d.getDate() + 1);
          }
          result.push({ label: `W${12 - w}`, value: sum });
        }
      } else {
        const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        for (let m = 11; m >= 0; m--) {
          const target = new Date(today.getFullYear(), today.getMonth() - m, 1);
          const year = target.getFullYear(), month = target.getMonth();
          const dim = new Date(year, month + 1, 0).getDate();
          let sum = 0;
          for (let day = 1; day <= dim; day++) {
            sum += getValue(days[`${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`]);
          }
          result.push({ label: monthNames[month], value: sum });
        }
      }
      return result;
    }

    function renderBarChart(chartData, colorClass) {
      const maxValue = Math.max(...chartData.map(d => d.value), 1);
      const bars = chartData.map(d => {
        const height = d.value > 0 ? Math.max(2, Math.round((d.value / maxValue) * 130)) : 0;
        const display = d.value >= 1000000 ? (d.value / 1000000).toFixed(1) + 'M'
          : d.value >= 1000 ? (d.value / 1000).toFixed(1) + 'K'
          : d.value % 1 !== 0 ? d.value.toFixed(2)
          : d.value || '';
        return `<div class="bar-chart-col">
          <div class="bar-chart-value">${display}</div>
          <div class="bar-chart-bar ${colorClass}" style="height:${height}px"></div>
          <div class="bar-chart-label">${d.label}</div>
        </div>`;
      }).join('');
      return `<div class="bar-chart">${bars}</div>`;
    }

    // ─── Heatmap Grid ───

    function buildHeatmapGrid(days) {
      const grid = document.getElementById('heatmapGrid');
      if (!grid) return;

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const dayOfWeek = today.getDay();
      const startDate = new Date(today);
      startDate.setDate(today.getDate() - (52 * 7 + dayOfWeek));

      const getValue = (d) => d ? (d.sessions || 0) : 0;

      const allValues = [], cellData = [];
      const d = new Date(startDate);
      while (d <= today) {
        const dateStr = d.toISOString().slice(0, 10);
        const val = getValue(days[dateStr]);
        allValues.push(val);
        cellData.push({ date: dateStr, value: val, dayOfWeek: d.getDay() });
        d.setDate(d.getDate() + 1);
      }

      const nonZero = allValues.filter(v => v > 0).sort((a, b) => a - b);
      const getLevel = (val) => {
        if (val === 0 || nonZero.length === 0) return 0;
        const p25 = nonZero[Math.floor(nonZero.length * 0.25)] || 1;
        const p50 = nonZero[Math.floor(nonZero.length * 0.50)] || 1;
        const p75 = nonZero[Math.floor(nonZero.length * 0.75)] || 1;
        if (val <= p25) return 1;
        if (val <= p50) return 2;
        if (val <= p75) return 3;
        return 4;
      };

      const dayLabels = ['', 'Mon', '', 'Wed', '', 'Fri', ''];
      grid.innerHTML = '';

      const monthSpacer = document.createElement('div');
      monthSpacer.className = 'heatmap-month-label';
      grid.appendChild(monthSpacer);

      for (let row = 0; row < 7; row++) {
        const label = document.createElement('div');
        label.className = 'heatmap-day-label';
        label.textContent = dayLabels[row];
        grid.appendChild(label);
      }

      let lastMonth = -1;
      for (let i = 0; i < cellData.length; i++) {
        const cell = cellData[i];
        const cellDate = new Date(cell.date + 'T00:00:00');

        if (cell.dayOfWeek === 0 || i === 0) {
          const monthIdx = cellDate.getMonth();
          const monthLabel = document.createElement('div');
          monthLabel.className = 'heatmap-month-label';
          if (monthIdx !== lastMonth) {
            monthLabel.textContent = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][monthIdx];
            lastMonth = monthIdx;
          }
          grid.appendChild(monthLabel);
        }

        const div = document.createElement('div');
        div.className = `heatmap-cell level-${getLevel(cell.value)}`;
        div.dataset.date = cell.date;
        grid.appendChild(div);
      }
    }

    function attachHeatmapTooltips(days) {
      const tooltip = document.getElementById('heatmapTooltip');
      const grid = document.getElementById('heatmapGrid');
      if (!tooltip || !grid) return;

      grid.addEventListener('mouseover', (e) => {
        const cell = e.target.closest('.heatmap-cell');
        if (!cell) return;

        const dateStr = cell.dataset.date;
        const dayData = days[dateStr];
        const dateObj = new Date(dateStr + 'T00:00:00');
        const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        const formatted = `${dateStr} (${dayNames[dateObj.getDay()]})`;

        let html = `<div class="tt-date">${formatted}</div>`;
        if (dayData) {
          html += `
            <div class="tt-row"><span class="tt-label">Sessions</span><span class="tt-value">${dayData.sessions || 0}</span></div>
            <div class="tt-row"><span class="tt-label">User Msgs</span><span class="tt-value">${dayData.userMessages || 0}</span></div>
            <div class="tt-row"><span class="tt-label">Assist Msgs</span><span class="tt-value">${dayData.assistantMessages || 0}</span></div>
            <div class="tt-row"><span class="tt-label">Tool Uses</span><span class="tt-value">${dayData.toolUses || 0}</span></div>
            <div class="tt-row"><span class="tt-label">Tokens</span><span class="tt-value">${formatNumber((dayData.inputTokens || 0) + (dayData.outputTokens || 0))}</span></div>
            <div class="tt-row"><span class="tt-label">Cost</span><span class="tt-value">$${(dayData.estimatedCost || 0).toFixed(2)}</span></div>`;
          if (dayData.projects?.length > 0) {
            html += `<div class="tt-row"><span class="tt-label">Projects</span><span class="tt-value">${dayData.projects.join(', ')}</span></div>`;
          }
        } else {
          html += '<div class="tt-row"><span class="tt-label">No activity</span></div>';
        }

        tooltip.innerHTML = html;
        tooltip.style.display = 'block';

        const rect = cell.getBoundingClientRect();
        tooltip.style.left = (rect.left + rect.width / 2) + 'px';
        tooltip.style.top = (rect.top - tooltip.offsetHeight - 8) + 'px';

        const ttRect = tooltip.getBoundingClientRect();
        if (ttRect.left < 0) tooltip.style.left = '8px';
        if (ttRect.right > window.innerWidth) tooltip.style.left = (window.innerWidth - ttRect.width - 8) + 'px';
        if (ttRect.top < 0) tooltip.style.top = (rect.bottom + 8) + 'px';
      });

      grid.addEventListener('mouseout', (e) => {
        if (e.target.closest('.heatmap-cell')) tooltip.style.display = 'none';
      });
    }

    function calculateHeatmapSummary(days) {
      let totalSessions = 0, activeDays = 0, totalCost = 0;
      const dates = Object.keys(days).sort();

      for (const date of dates) {
        const d = days[date];
        totalSessions += d.sessions || 0;
        totalCost += d.estimatedCost || 0;
        if ((d.sessions || 0) > 0) activeDays++;
      }

      const today = new Date(); today.setHours(0, 0, 0, 0);
      let currentStreak = 0;
      const check = new Date(today);
      while (true) {
        const ds = check.toISOString().slice(0, 10);
        if (days[ds] && (days[ds].sessions || 0) > 0) { currentStreak++; check.setDate(check.getDate() - 1); }
        else break;
      }

      let longestStreak = 0, streak = 0;
      if (dates.length > 0) {
        const start = new Date(dates[0] + 'T00:00:00');
        const end = new Date(dates[dates.length - 1] + 'T00:00:00');
        const d2 = new Date(start);
        while (d2 <= end) {
          const ds = d2.toISOString().slice(0, 10);
          if (days[ds] && (days[ds].sessions || 0) > 0) { streak++; if (streak > longestStreak) longestStreak = streak; }
          else streak = 0;
          d2.setDate(d2.getDate() + 1);
        }
      }

      return { totalSessions, activeDays, currentStreak, longestStreak, totalCost };
    }

    // ─── Navigation ───

    const _tabScrollPositions = {};

    function initNavigation() {
      const navBtns = document.querySelectorAll('.sidebar-btn');
      navBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const prevView = state.currentView;

          if (elements.mainContent) _tabScrollPositions[prevView] = elements.mainContent.scrollTop;

          navBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          state.currentView = btn.dataset.view;
          localStorage.setItem('dashboard-tab', state.currentView);

          if (state.currentView === 'office') initOffice();
          else if (prevView === 'office') stopOffice();

          if (state.currentView === 'heatmap' || state.currentView === 'usage') heatmapState.data = null;

          render();

          if (elements.mainContent && _tabScrollPositions[state.currentView]) {
            elements.mainContent.scrollTop = _tabScrollPositions[state.currentView];
          }
        });
      });
    }

    // ─── Init ───

    function init() {
      initNavigation();

      // Sync saved tab to button state
      const navBtns = document.querySelectorAll('.sidebar-btn');
      navBtns.forEach(b => {
        if (b.dataset.view === state.currentView) b.classList.add('active');
        else b.classList.remove('active');
      });

      connectSSE();
      if (state.currentView === 'office') initOffice();
      render();
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
  </script>
</body>
